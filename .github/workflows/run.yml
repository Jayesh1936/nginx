name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Verify Files
        run: ls -la

      - name: Deploy Website
        run: |
          sudo mkdir -p /var/www/html
          sudo rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ./ /var/www/html/

      - name: Restart Nginx
        run: sudo systemctl restart nginx
